[build]
  publish = "build"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/image"
  to = "/image.html"
  status = 200

[[redirects]]
  from = "/pdf"
  to = "/pdf.html"
  status = 200

[[redirects]]
  from = "/insound"
  to = "/insound/index.html"
  status = 200

[[redirects]]
  from = "/insound/*"
  to = "/insound/index.html"
  status = 200


# SPA fallback: unknown paths serve main shell (existing files under publish/ still win first).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
